<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://bootswatch.com/5/sketchy/bootstrap.min.css" type="text/css">
</head>
    <body>
<!--Buttom to open the Modal-->
    <div class="d-flex justify-content-center mb-3 p-3">
        <button type="button" class="btn-lg"  data-toggle="modal"data-target="#myModal">Open dialog </button>
    </div>
<!--The Modal-->
    <div class="modal fade" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <!--Modal Header-->
                <div class="modal-header">
                    <h3 class="modal-title">Are you sure?</h3>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <!--Modal body-->
                <div class="modal-body">
                    Are you sure you wish to submit this album?
                </div>
                <!--Modal Footer-->
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger">Confirm</button>
                </div>
            </div>
        
        </div>
        
    </div>
    

    
    
       
        </body>
        </html>
